<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SMART EXPENSE TRACKER</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="spinner-overlay" id="loading-spinner"><div class="spinner"></div></div>

    <div id="app-container">
        <!-- Main Component gets injected here -->
        
        <div class="profile-hero" style="background: linear-gradient(135deg, var(--accent-color), #4338ca); height: 180px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; position: relative;">
        </div>
        
        <div class="glass-panel" style="margin: -80px auto 2rem auto; max-width: 900px; border-radius: var(--radius-lg); position: relative; z-index: 10;">
            <div style="display: flex; gap: 3rem; flex-wrap: wrap; padding: 2rem;">
                
                <!-- Avatar Section -->
                <div style="flex: 1; text-align: center; min-width: 250px; margin-top: -60px;">
                    <div id="profile-avatar-display" style="width: 150px; height: 150px; border-radius: 50%; background: #ffffff; color: var(--accent-color); border: 5px solid var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: 800; margin: 0 auto 1.5rem auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: transform 0.3s ease; cursor: pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        U
                    </div>
                    <h2 id="profile-name-display" style="margin-bottom: 0.5rem; font-size: 1.8rem;" data-i18n="profDisplayName"></h2>
                    <p id="profile-email-display" style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1rem;"></p>
                    
                    <div style="background: var(--bg-primary); padding: 1.5rem; border-radius: var(--radius-md); text-align: left; border: 1px solid var(--border-color);">
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(99, 102, 241, 0.1); color: var(--accent-color); display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa-solid fa-shield-check"></i>
                            </div>
                            <div>
                                <h4 style="margin: 0; font-size: 0.9rem;">Status</h4>
                                <p style="margin: 0; color: var(--success); font-size: 0.85rem; font-weight: 600;">Verified Account</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(16, 185, 129, 0.1); color: var(--success); display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa-solid fa-clock"></i>
                            </div>
                            <div>
                                <h4 style="margin: 0; font-size: 0.9rem;">Member Since</h4>
                                <p id="profile-created-date" style="margin: 0; color: var(--text-secondary); font-size: 0.85rem;">Just now</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form Section -->
                <div style="flex: 2; min-width: 300px;">
                    <form id="profile-form">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
                            <h3 style="margin: 0;" data-i18n="profDetails">Personal Details</h3>
                            <span style="font-size: 0.85rem; color: var(--text-secondary);"><i class="fa-solid fa-pen-to-square"></i> Editable</span>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" data-i18n="profFullName">Full Name</label>
                            <input type="text" id="prof-name" class="form-control" required style="font-size: 1.05rem; padding: 0.875rem; transition: border-color 0.2s ease, box-shadow 0.2s ease;">
                        </div>

                        <div class="form-group">
                            <label class="form-label" data-i18n="profEmail">Email (Read Only)</label>
                            <div style="position: relative;">
                                <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 15px; color: var(--text-secondary);"></i>
                                <input type="email" id="prof-email" class="form-control" readonly disabled style="background: var(--bg-primary); padding-left: 2.5rem; cursor: not-allowed; opacity: 0.7;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" data-i18n="profBio">Short Bio (Financial Goals)</label>
                            <textarea id="prof-bio" class="form-control" rows="4" placeholder="Tell us about your financial journey..."></textarea>
                        </div>
                        
                        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                            <button type="button" class="btn btn-outline" id="btn-cancel-profile" data-i18n="btnCancel" style="padding: 0.75rem 1.5rem;">Discard</button>
                            <button type="submit" class="btn btn-primary" data-i18n="btnSaveProfile" style="padding: 0.75rem 1.5rem;"><i class="fa-solid fa-floppy-disk" style="margin-right: 8px;"></i> Save Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
