<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SMART EXPENSE TRACKER</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

    <div class="spinner-overlay" id="loading-spinner">
        <div class="spinner"></div>
    </div>

    <div class="glass-panel auth-container">
        <div class="auth-header">
            <i class="fa-solid fa-wallet auth-logo"></i>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to track your personal expenses</p>
        </div>

        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                    <input type="email" id="email" class="form-control" style="padding-left: 2.5rem;" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                    <input type="password" id="password" class="form-control" style="padding-left: 2.5rem;" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                Login <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="register.html">Sign up here</a>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { handleLogin } from './js/auth.js';
        
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            handleLogin(email, password);
        });
    </script>
</body>
</html>
