<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget - SMART EXPENSE TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .budget-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
        }
        @media (max-width: 900px) { .budget-grid { grid-template-columns: 1fr; } }
        
        .budget-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .budget-item {
            display: flex; flex-direction: column; gap: 0.5rem;
            margin-bottom: 1.5rem; padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .budget-item:last-child { margin-bottom: 0; padding-bottom: 0; border: none; }
        .b-header { display: flex; justify-content: space-between; align-items: baseline; }
        
        .b-label { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .b-amounts { font-size: 0.9rem; color: var(--text-secondary); }
        .b-amounts strong { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="spinner-overlay" id="loading-spinner"><div class="spinner"></div></div>

    <div id="app-container">
        
        <div class="budget-grid">
            <!-- Left Side: Set Budgets Form -->
            <div>
                <div class="budget-card">
                    <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-wallet text-success"></i> Overall Monthly Budget</h3>
                    <form id="overall-budget-form">
                        <div class="form-group">
                            <label class="form-label">Total Limit</label>
                            <input type="number" id="monthly-limit" class="form-control" required placeholder="e.g. 15000">
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="width: 100%;">Set Overall Budget</button>
                    </form>
                </div>

                <div class="budget-card">
                    <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-tags text-warning"></i> Category Budget</h3>
                    <form id="cat-budget-form">
                        <div class="form-group">
                            <label class="form-label">Select Category</label>
                            <select id="cat-select" class="form-control" required>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Limit Amount</label>
                            <input type="number" id="cat-limit" class="form-control" required placeholder="e.g. 3000">
                        </div>
                        <button type="submit" class="btn btn-outline w-100" style="width: 100%;">Set Category Limit</button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Budget Tracking -->
            <div>
                <div class="glass-panel" style="padding: 1.5rem; height: 100%;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="margin: 0;">Budget vs Actual</h2>
                        <input type="month" id="budget-month" class="form-control" style="max-width: 200px;">
                    </div>
                    
                    <div id="budget-tracking-container">
                        <!-- Populated by JS -->
                        <div class="empty-state">
                            <div class="spinner" style="margin: 0 auto;"></div>
                            <p>Loading budget data...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/budget.js"></script>
</body>
</html>
