<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income - SMART EXPENSE TRACKER</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .filters {
            display: flex;
            gap: 1rem;
            flex-grow: 1;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:hover td { background-color: rgba(99, 102, 241, 0.05); }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .btn-icon {
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary); font-size: 1.1rem; transition: var(--transition);
        }
        .btn-icon:hover { color: var(--accent-color); }
        .btn-icon.delete:hover { color: var(--danger); }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary); padding: 2rem; border-radius: var(--radius-lg);
            width: 100%; max-width: 500px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glass);
        }
        .source-badge {
            background: rgba(16, 185, 129, 0.1); color: var(--success);
            padding: 0.25rem 0.75rem; border-radius: 999px; font-weight: 600; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="spinner-overlay" id="loading-spinner"><div class="spinner"></div></div>

    <div id="app-container">
        <!-- Main Component -->
        <div class="page-controls">
            <div class="filters">
                <input type="text" id="search-input" class="form-control" placeholder="Search income..." style="max-width: 250px;">
                <select id="filter-source" class="form-control" style="max-width: 200px;">
                    <option value="">All Sources</option>
                    <option value="Pocket Money">Pocket Money</option>
                    <option value="Scholarship">Scholarship</option>
                    <option value="Part-time Job">Part-time Job</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Other">Other</option>
                </select>
                <input type="month" id="filter-month" class="form-control" style="max-width: 200px;">
            </div>
            <button class="btn btn-primary" id="btn-add">
                <i class="fa-solid fa-plus"></i> Add Income
            </button>
        </div>

        <div class="glass-panel" style="padding: 1.5rem;">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Source</th>
                            <th>Recurring</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
            <div id="empty-state" class="empty-state hidden">
                <i class="fa-solid fa-hand-holding-dollar"></i>
                <p>No income records found.</p>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal" id="data-modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom: 1.5rem; font-size: 1.5rem;">Add Income</h3>
            <form id="data-form">
                <input type="hidden" id="entry-id">
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" id="in-amount" class="form-control" required placeholder="e.g. 5000.00">
                </div>
                <div class="form-group">
                    <label class="form-label">Description / Note</label>
                    <input type="text" id="in-desc" class="form-control" required placeholder="Monthly allowance">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Date</label>
                        <input type="date" id="in-date" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Source</label>
                        <select id="in-source" class="form-control" required>
                            <option value="Pocket Money">Pocket Money</option>
                            <option value="Scholarship">Scholarship</option>
                            <option value="Part-time Job">Part-time Job</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="in-recurring" style="width: 18px; height: 18px;">
                        <span>This is a recurring monthly income</span>
                    </label>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" id="btn-cancel" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Income</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/income.js"></script>
</body>
</html>
